steps:
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE_REPO}:$SHORT_SHA
      - .
    dir: backend

  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE_REPO}:$SHORT_SHA

  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_IMAGE_REPO}:$SHORT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - '8080'
      - --update-env-vars
      - RAG_SERVICE_URL=${_RAG_SERVICE_URL},RAG_ADMIN_EMAIL=${_RAG_ADMIN_EMAIL}

  - id: deploy-ingestion-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - ${_JOB_NAME}
      - --image
      - ${_IMAGE_REPO}:$SHORT_SHA
      - --region
      - ${_REGION}
      - --command
      - node
      - --args
      - dist/cron/runIngestion.js
      - --task-timeout
      - 45m
      - --update-env-vars
      - RAG_SERVICE_URL=${_RAG_SERVICE_URL},RAG_ADMIN_EMAIL=${_RAG_ADMIN_EMAIL}

images:
  - ${_IMAGE_REPO}:$SHORT_SHA

substitutions:
  _REGION: asia-south1
  _SERVICE: india-report-backend
  _JOB_NAME: india-report-ingestion-job
  _RAG_SERVICE_URL: https://india-report-rag-223906966157.asia-south1.run.app
  _RAG_ADMIN_EMAIL: aryasuraj351@gmail.com
  _IMAGE_REPO: asia-south1-docker.pkg.dev/project-0bdd0a8e-1e7e-4477-99a/cloud-run-source-deploy/india-report-backend

options:
  logging: CLOUD_LOGGING_ONLY
