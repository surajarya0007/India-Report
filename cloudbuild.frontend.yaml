steps:
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_BACKEND_URL}
      - --build-arg
      - NEXT_PUBLIC_RAG_API_URL=${_RAG_SERVICE_URL}
      - --build-arg
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID}
      - --build-arg
      - NEXT_PUBLIC_ADSENSE_CLIENT_ID=${_ADSENSE_CLIENT_ID}
      - -t
      - ${_IMAGE_REPO}:$SHORT_SHA
      - .
    dir: frontend

  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE_REPO}:$SHORT_SHA

  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_IMAGE_REPO}:$SHORT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - '8080'
      - --update-env-vars
      - BACKEND_URL=${_BACKEND_URL},NEXT_PUBLIC_API_URL=${_BACKEND_URL},NEXT_PUBLIC_RAG_API_URL=${_RAG_SERVICE_URL},NEXT_PUBLIC_GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID},NEXT_PUBLIC_ADSENSE_CLIENT_ID=${_ADSENSE_CLIENT_ID}

images:
  - ${_IMAGE_REPO}:$SHORT_SHA

substitutions:
  _REGION: asia-south1
  _SERVICE: india-report-frontend
  _BACKEND_URL: https://india-report-backend-qzqmxyljqa-el.a.run.app
  _RAG_SERVICE_URL: https://india-report-rag-223906966157.asia-south1.run.app
  _GOOGLE_CLIENT_ID: 223906966157-l0vcmigc2v5aalitm62qo6mk4r527gu8.apps.googleusercontent.com
  _ADSENSE_CLIENT_ID: ca-pub-7269654171240753
  _IMAGE_REPO: asia-south1-docker.pkg.dev/project-0bdd0a8e-1e7e-4477-99a/cloud-run-source-deploy/india-report-frontend

options:
  logging: CLOUD_LOGGING_ONLY
